<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>MotifLab for Suno</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
        color: #202326;
        background:
          radial-gradient(circle, #d9d9d9 1.5px, transparent 2.5px) 0 0 / 28px 28px,
          #ffffff;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      p {
        margin: 0;
        color: #69747c;
        line-height: 1.5;
      }
      button {
        width: 100%;
        min-height: 38px;
        margin: 12px 0 8px;
        border: 0;
        border-radius: 10px;
        background: #111111;
        color: white;
        font-weight: 850;
      }
    </style>
  </head>
  <body>
    <h1>MotifLab for Suno</h1>
    <p>打開 Suno 後，右下角會出現 M 按鈕。若沒有出現，先刷新頁面，或點下面的手動開啟。</p>
    <button id="openPanel">在目前頁面開啟面板</button>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
