<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>MuUsic for Suno</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
        color: #161616;
        background:
          radial-gradient(circle, rgba(120, 125, 132, 0.24) 1.5px, transparent 2.6px) 0 0 / 28px 28px,
          linear-gradient(180deg, #ffffff, #f8fafc);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 900;
      }
      p {
        margin: 0;
        color: #6f6f6f;
        line-height: 1.5;
      }
      button {
        width: 100%;
        min-height: 38px;
        margin: 12px 0 8px;
        border: 1px solid #111111;
        border-radius: 10px;
        background: linear-gradient(180deg, #232323, #111111);
        color: white;
        font-weight: 850;
        box-shadow: 0 8px 18px rgba(17, 17, 17, 0.12);
      }
      button:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <h1>MuUsic for Suno</h1>
    <p>打開 Suno 後，右下角會出現 M 按鈕。若沒有出現，先刷新頁面，或點下面的手動開啟。</p>
    <button id="openPanel">在目前頁面開啟面板</button>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
